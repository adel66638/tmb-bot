<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>TMB Mining</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f5a623;
      --gold2: #ffcc44;
      --red: #e84040;
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --card: rgba(255,255,255,0.05);
      --border: rgba(245,166,35,0.25);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.5);
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    #loader {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    #loader .spin {
      width: 56px; height: 56px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader span { color: var(--gold); font-family: 'Orbitron', sans-serif; font-size: 13px; }

    #app {
      display: flex; flex-direction: column;
      height: 100vh; width: 100%;
      position: relative;
      background:
        radial-gradient(ellipse at 50% -10%, rgba(245,166,35,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(232,64,64,0.08) 0%, transparent 50%),
        var(--bg);
    }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo-txt {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px; font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    .level-badge {
      background: linear-gradient(135deg, var(--gold), #c8860a);
      color: #000; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      font-family: 'Rajdhani', sans-serif;
    }
    .status-pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--card); border: 1px solid var(--border);
      padding: 4px 12px; border-radius: 20px;
      font-size: 11px; letter-spacing: 1px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot.idle { background: #888; }
    .dot.mining { background: #4cff88; box-shadow: 0 0 6px #4cff88; animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .screens { flex: 1; overflow: hidden; position: relative; }
    .screen { position: absolute; inset: 0; display: none; flex-direction: column; overflow-y: auto; }
    .screen.active { display: flex; }

    .mine-content {
      display: flex; flex-direction: column;
      align-items: center; padding: 16px 18px 100px;
      gap: 12px;
    }

    .wallet-row { display: flex; gap: 10px; width: 100%; }
    .wallet-card {
      flex: 1; background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px;
      text-align: center;
    }
    .wallet-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .wallet-val { font-family: 'Orbitron', sans-serif; font-size: 13px; color: var(--gold); margin-top: 3px; }

    .pending-box { width: 100%; text-align: center; padding: 8px; }
    .pending-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px; font-weight: 900;
      color: #00e5ff;
      text-shadow: 0 0 20px rgba(0,229,255,0.4);
      letter-spacing: 2px;
    }
    .pending-lbl { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }

    .coin-wrap { position: relative; width: 180px; height: 180px; margin: 4px 0; }
    .coin {
      width: 180px; height: 180px;
      background: radial-gradient(circle at 38% 35%, #ffe066, #c8860a 60%, #7a4f00 100%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 38px; font-weight: 900; color: #1a0a00;
      letter-spacing: 1px;
      box-shadow:
        0 0 0 6px rgba(200,134,10,0.3),
        0 0 40px rgba(245,166,35,0.4),
        0 8px 32px rgba(0,0,0,0.6);
      animation: float 3s ease-in-out infinite;
      transition: transform 0.3s;
      user-select: none;
    }
    .coin::before {
      content: '';
      position: absolute; inset: 10px;
      border-radius: 50%;
      border: 2px solid rgba(255,220,80,0.3);
    }
    .coin.bounce { animation: coinBounce 0.5s ease !important; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes coinBounce {
      0%{transform:scale(1)} 30%{transform:scale(1.15)} 60%{transform:scale(0.95)} 100%{transform:scale(1)}
    }

    .sparkle {
      position: absolute; pointer-events: none;
      width: 6px; height: 6px; border-radius: 50%; background: var(--gold2);
      animation: sparkle 2.4s ease-in-out infinite;
      opacity: 0;
    }
    .sparkle:nth-child(1){ top:10%; left:20%; animation-delay:0s; }
    .sparkle:nth-child(2){ top:20%; right:15%; animation-delay:0.6s; }
    .sparkle:nth-child(3){ bottom:15%; left:15%; animation-delay:1.2s; }
    .sparkle:nth-child(4){ bottom:20%; right:20%; animation-delay:1.8s; }
    @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }

    .main-btn {
      width: 100%;
      padding: 18px;
      border: none; border-radius: 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: 16px; font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .main-btn:active { transform: scale(0.97); }
    .start-btn {
      background: linear-gradient(135deg, #2a1a00, #4a2f00);
      color: var(--gold);
      border: 1px solid var(--gold);
      box-shadow: 0 4px 24px rgba(245,166,35,0.2);
    }
    .start-btn:hover { box-shadow: 0 4px 32px rgba(245,166,35,0.4); }
    .claim-btn {
      background: linear-gradient(135deg, var(--gold), #c8860a);
      color: #000;
      box-shadow: 0 4px 24px rgba(245,166,35,0.4);
    }
    .claim-btn:hover { box-shadow: 0 4px 32px rgba(245,166,35,0.6); }

    .buy-btn {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      background: linear-gradient(135deg, var(--red), #8b1a1a);
      border: none; border-radius: 14px;
      color: white; cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(232,64,64,0.3);
      transition: transform 0.15s;
    }
    .buy-btn:active { transform: scale(0.97); }
    .buy-btn-left { display: flex; align-items: center; gap: 10px; }
    .buy-btn-title { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; }
    .buy-btn-sub { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .buy-arrow { font-size: 20px; opacity: 0.8; }

    .screen-content { padding: 16px 18px 100px; }
    .screen-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px; font-weight: 700;
      text-align: center; color: var(--gold);
      margin-bottom: 20px; letter-spacing: 2px;
    }
    .info-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
    }
    .info-icon { font-size: 24px; width: 36px; text-align: center; }
    .info-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .info-val { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); margin-top: 2px; }
    .info-val.green { color: #4cff88; }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px; letter-spacing: 3px;
      color: var(--muted); text-align: center;
      margin: 20px 0 12px; text-transform: uppercase;
    }
    .action-btn {
      width: 100%; padding: 16px 20px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; color: var(--text);
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; margin-bottom: 10px;
      font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600;
      transition: border-color 0.2s, background 0.2s;
    }
    .action-btn:hover { border-color: var(--gold); background: rgba(245,166,35,0.06); }
    .action-btn .withdraw-badge {
      background: linear-gradient(135deg, var(--gold), #c8860a);
      color: #000; padding: 4px 16px; border-radius: 20px;
      font-size: 12px; font-weight: 700; font-family: 'Orbitron', sans-serif;
    }

    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-top: 1px solid var(--border);
      display: flex; justify-content: space-around;
      padding: 10px 0;
      z-index: 100;
    }
    .tab-btn {
      background: none; border: none; color: var(--muted);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 10px; cursor: pointer;
    }
    .tab-btn.active { color: var(--gold); }
    .tab-btn svg { width: 24px; height: 24px; fill: currentColor; }

    .friends-content { padding: 16px 18px 100px; }
    .ref-count-box {
      text-align: center; padding: 24px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; margin-bottom: 16px;
    }
    .ref-big { font-family: 'Orbitron', sans-serif; font-size: 48px; font-weight: 900; color: var(--gold); }
    .ref-sub { color: var(--muted); font-size: 13px; margin-top: 4px; letter-spacing: 1px; }
    .ref-bonus { display: flex; gap: 10px; margin-bottom: 16px; }
    .bonus-card {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px; text-align: center;
    }
    .bonus-value { font-family: 'Orbitron'; font-size: 20px; color: var(--gold); }
    .bonus-label { color: var(--muted); font-size: 11px; margin-top: 4px; }

    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.9); border: 1px solid var(--border);
      color: var(--text); padding: 12px 24px; border-radius: 30px;
      font-size: 13px; z-index: 1000;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #toast.show { opacity: 1; }

    #captcha-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center;
    }
    #captcha-overlay.visible { display: flex; }
    .captcha-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; width: 90%; max-width: 320px;
      text-align: center;
    }
    .captcha-q { font-family: 'Orbitron'; font-size: 28px; color: var(--gold); margin-bottom: 16px; }
    .captcha-input {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 16px; text-align: center;
      margin-bottom: 16px;
    }
    .captcha-btns { display: flex; gap: 10px; }
    .captcha-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
    .captcha-cancel { background: var(--card); color: var(--text); }
    .captcha-confirm { background: var(--gold); color: #000; }

    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
    }
    .shake { animation: shake 0.4s ease; }

    @media (max-width: 360px) {
      .ref-big { font-size: 36px; }
      .pending-num { font-size: 28px; }
    }
  </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="spin"></div>
  <span>LOADING TMB...</span>
</div>

<!-- APP -->
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <span class="logo-txt">TMB</span>
      <span class="level-badge" id="lvl-badge">Lvl 1</span>
    </div>
    <div class="status-pill">
      <span class="dot idle" id="status-dot"></span>
      <span id="status-txt">IDLE</span>
    </div>
  </div>

  <!-- SCREENS -->
  <div class="screens">

    <!-- MINE -->
    <div class="screen" id="screen-mine">
      <div class="mine-content">
        <div class="wallet-row">
          <div class="wallet-card">
            <div class="wallet-label">POOL</div>
            <div class="wallet-val" id="pool-val">0.0000</div>
          </div>
          <div class="wallet-card">
            <div class="wallet-label">HOLDING</div>
            <div class="wallet-val" id="holding-val">0.0000</div>
          </div>
        </div>

        <div class="pending-box">
          <div class="pending-num" id="pending-val">0.0000</div>
          <div class="pending-lbl">PENDING TMB</div>
        </div>

        <div class="coin-wrap">
          <div class="sparkle"></div>
          <div class="sparkle"></div>
          <div class="sparkle"></div>
          <div class="sparkle"></div>
          <div class="coin">TMB</div>
        </div>

        <button class="main-btn start-btn" id="main-btn">START</button>

        <a class="buy-btn" href="https://t.me/TMBBot">
          <div class="buy-btn-left">
            <span>💎</span>
            <div>
              <div class="buy-btn-title">BUY TMB</div>
              <div class="buy-btn-sub">Get more on exchange</div>
            </div>
          </div>
          <span class="buy-arrow">→</span>
        </a>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="screen" id="screen-profile">
      <div class="screen-content">
        <div class="screen-title">PROFILE</div>
        <div class="info-card">
          <div class="info-icon">🆔</div>
          <div>
            <div class="info-label">USER ID</div>
            <div class="info-val" id="p-userid">—</div>
          </div>
        </div>
        <div class="info-card">
          <div class="info-icon">💰</div>
          <div>
            <div class="info-label">TOTAL ASSETS</div>
            <div class="info-val green" id="p-assets">0.0000 TMB</div>
          </div>
        </div>
        <div class="info-card">
          <div class="info-icon">🏦</div>
          <div>
            <div class="info-label">HOLDING</div>
            <div class="info-val" id="p-holding">0.0000 TMB</div>
          </div>
        </div>
        <div class="info-card">
          <div class="info-icon">⛏️</div>
          <div>
            <div class="info-label">POOL</div>
            <div class="info-val" id="p-pool">0.0000 TMB</div>
          </div>
        </div>
        <div class="section-title">ACTIONS</div>
        <button class="action-btn" id="btn-withdraw">
          <span>Transfer Pool → Holding</span>
          <span class="withdraw-badge">MOVE</span>
        </button>
      </div>
    </div>

    <!-- FRIENDS -->
    <div class="screen" id="screen-friends">
      <div class="friends-content">
        <div class="screen-title">FRIENDS</div>
        <div class="ref-count-box">
          <div class="ref-big" id="ref-count">0</div>
          <div class="ref-sub">REFERRALS</div>
        </div>
        <div class="ref-bonus">
          <div class="bonus-card">
            <div class="bonus-value">+0.001</div>
            <div class="bonus-label">per friend</div>
          </div>
          <div class="bonus-card">
            <div class="bonus-value">+0.005</div>
            <div class="bonus-label">premium friend</div>
          </div>
        </div>
        <div class="info-card">
          <div class="info-icon">🔗</div>
          <div style="flex:1;overflow:hidden">
            <div class="info-label">YOUR LINK</div>
            <div class="info-val" id="ref-link" style="font-size:11px;word-break:break-all">—</div>
          </div>
        </div>
        <button class="main-btn start-btn" id="copy-ref">COPY LINK</button>
      </div>
    </div>

  </div><!-- /screens -->

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="mine">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      Mine
    </button>
    <button class="tab-btn" data-tab="profile">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>
      Profile
    </button>
    <button class="tab-btn" data-tab="friends">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Friends
    </button>
  </div>

</div><!-- /app -->

<!-- TOAST -->
<div id="toast"></div>

<!-- CAPTCHA -->
<div id="captcha-overlay">
  <div class="captcha-box">
    <div class="captcha-q" id="captcha-question">? + ?</div>
    <input class="captcha-input" id="captcha-input" type="number" placeholder="Answer"/>
    <div class="captcha-btns">
      <button class="captcha-btn captcha-cancel" id="captcha-cancel">Cancel</button>
      <button class="captcha-btn captcha-confirm" id="captcha-confirm">Confirm</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD2qYpHNu5BOLPijj_YiiIsR18U54dDh0M",
    authDomain: "tmb-mining.firebaseapp.com",
    projectId: "tmb-mining",
    storageBucket: "tmb-mining.appspot.com",
    messagingSenderId: "1078313749560",
    appId: "1:1078313749560:web:e3615be7dd22b9085f94f0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const MINE_AMOUNT = 0.0008;
  const MINE_DURATION = 3600;

  const tg = window.Telegram?.WebApp;
  const tgUser = tg?.initDataUnsafe?.user || { id: 0, first_name: "Demo", username: "demo" };

  if (tg) {
    tg.ready();
    tg.expand();
    tg.setBackgroundColor("#0a0a0a");
    tg.setHeaderColor("#0a0a0a");
  }

  async function loadUser(uid) {
    const ref = doc(db, "users", String(uid));
    const snap = await getDoc(ref);
    if (snap.exists()) return snap.data();
    const newUser = {
      uid: String(uid),
      first_name: tgUser.first_name,
      username: tgUser.username || "",
      pool: 0, holding: 0, level: 1,
      mining: false, mineStart: null, lastClaim: null,
      referrals: 0, createdAt: serverTimestamp()
    };
    await setDoc(ref, newUser);
    return newUser;
  }

  async function saveUser(uid, data) {
    const ref = doc(db, "users", String(uid));
    await updateDoc(ref, data);
  }

  let userData = null;
  let pendingInterval = null;
  const $ = id => document.getElementById(id);

  function showScreen(name) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("screen-" + name).classList.add("active");
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    const tab = document.querySelector(`[data-tab="${name}"]`);
    if (tab) tab.classList.add("active");
  }

  function getPending(user) {
    if (!user.mining || !user.mineStart) return 0;
    const elapsed = Date.now() / 1000 - user.mineStart;
    return Math.min((elapsed / MINE_DURATION) * MINE_AMOUNT, MINE_AMOUNT);
  }

  function renderMine() {
    const pending = getPending(userData);
    $("pool-val").textContent = userData.pool?.toFixed(4) || "0.0000";
    $("holding-val").textContent = userData.holding?.toFixed(4) || "0.0000";
    $("pending-val").textContent = pending.toFixed(4);
    $("lvl-badge").textContent = "Lvl " + (userData.level || 1);
    $("status-dot").className = "dot " + (userData.mining ? "mining" : "idle");
    $("status-txt").textContent = userData.mining ? "MINING" : "IDLE";
    if (userData.mining) {
      $("main-btn").textContent = "CLAIM";
      $("main-btn").className = "main-btn claim-btn";
      $("main-btn").onclick = handleClaim;
    } else {
      $("main-btn").textContent = "START";
      $("main-btn").className = "main-btn start-btn";
      $("main-btn").onclick = handleStart;
    }
  }

  function startTicker() {
    clearInterval(pendingInterval);
    pendingInterval = setInterval(() => {
      if (userData?.mining) $("pending-val").textContent = getPending(userData).toFixed(4);
    }, 2000);
  }

  let captchaAnswer = null;
  function showCaptcha() {
    const a = Math.floor(Math.random() * 15) + 1;
    const b = Math.floor(Math.random() * 15) + 1;
    const ops = [{ op: "+", ans: a + b }, { op: "-", ans: a - b }];
    const chosen = ops[Math.floor(Math.random() * ops.length)];
    captchaAnswer = chosen.ans;
    $("captcha-question").textContent = `${a} ${chosen.op} ${b}`;
    $("captcha-input").value = "";
    $("captcha-overlay").classList.add("visible");
  }
  function hideCaptcha() { $("captcha-overlay").classList.remove("visible"); }

  $("captcha-cancel").onclick = hideCaptcha;
  $("captcha-confirm").onclick = async () => {
    const val = parseInt($("captcha-input").value.trim());
    if (isNaN(val) || val !== captchaAnswer) {
      $("captcha-input").classList.add("shake");
      setTimeout(() => $("captcha-input").classList.remove("shake"), 500);
      showToast("❌ Wrong answer!");
      return;
    }
    hideCaptcha();
    await startMining();
  };

  function handleStart() { showCaptcha(); }

  async function startMining() {
    const now = Date.now() / 1000;
    userData.mining = true;
    userData.mineStart = now;
    userData.lastClaim = now;
    await saveUser(tgUser.id, { mining: true, mineStart: now, lastClaim: now });
    renderMine();
    showToast("⛏️ Mining started!");
  }

  async function handleClaim() {
    if (!userData.mining) return;
    const pending = getPending(userData);
    const newPool = (userData.pool || 0) + pending;
    const now = Date.now() / 1000;
    userData.pool = parseFloat(newPool.toFixed(4));
    userData.mineStart = now;
    userData.lastClaim = now;
    await saveUser(tgUser.id, { pool: userData.pool, mineStart: now, lastClaim: now });
    renderMine();
    showToast(`✅ Claimed ${pending.toFixed(4)} TMB!`);
    document.querySelector(".coin").classList.add("bounce");
    setTimeout(() => document.querySelector(".coin").classList.remove("bounce"), 600);
  }

  function renderProfile() {
    $("p-userid").textContent = userData.uid || tgUser.id;
    $("p-assets").textContent = ((userData.pool || 0) + (userData.holding || 0)).toFixed(4) + " TMB";
    $("p-holding").textContent = (userData.holding || 0).toFixed(4) + " TMB";
    $("p-pool").textContent = (userData.pool || 0).toFixed(4) + " TMB";
  }

  $("btn-withdraw").onclick = async () => {
    const pool = userData.pool || 0;
    if (pool <= 0) { showToast("Pool is empty!"); return; }
    userData.holding = parseFloat(((userData.holding || 0) + pool).toFixed(4));
    userData.pool = 0;
    await saveUser(tgUser.id, { pool: 0, holding: userData.holding });
    renderProfile();
    showToast(`💰 Transferred ${pool.toFixed(4)} TMB!`);
  };

  function renderFriends() {
    const botUser = "TMBBot";
    const link = `https://t.me/${botUser}?start=${tgUser.id}`;
    $("ref-link").textContent = link;
    $("ref-count").textContent = userData.referrals || 0;
    $("copy-ref").onclick = () => {
      navigator.clipboard?.writeText(link);
      showToast("🔗 Link copied!");
    };
  }

  function showToast(msg) {
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.onclick = () => {
      const tab = btn.dataset.tab;
      showScreen(tab);
      if (tab === "mine") renderMine();
      if (tab === "profile") renderProfile();
      if (tab === "friends") renderFriends();
    };
  });

  async function boot() {
    $("loader").style.display = "flex";
    try {
      userData = await loadUser(tgUser.id);
      renderMine();
      startTicker();
      showScreen("mine");
    } catch(e) {
      console.error(e);
      showToast("⚠️ Connection error. Check Firebase config.");
    }
    $("loader").style.display = "none";
  }

  boot();
</script>

</body>
</html>
